<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NikGApps | Pro Configurator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-base: #f8f9ff;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1a1c1e;
            --accent: #006494;
            --sidebar-bg: rgba(255, 255, 255, 0.98);
            --border: rgba(0, 0, 0, 0.05);
            --overlay-bg: rgba(0, 0, 0, 0.5); 
            --blob-1: #d0e4ff;
            --blob-2: #e1dfff;
            --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-base: #0f1115;
                --card-bg: rgba(26, 28, 30, 0.6);
                --text-main: #e2e2e6;
                --accent: #91cdff;
                --sidebar-bg: rgba(15, 17, 21, 0.98);
                --border: rgba(255, 255, 255, 0.08);
                --overlay-bg: rgba(0, 0, 0, 0.8);
                --blob-1: #1e2a3d;
                --blob-2: #28224d;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        .bg-wrapper { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .blob { position: absolute; width: 600px; height: 600px; border-radius: 50%; opacity: 0.5; animation: float 25s infinite ease-in-out alternate; }
        .blob-1 { background: var(--blob-1); top: -100px; left: -100px; }
        .blob-2 { background: var(--blob-2); bottom: -100px; right: -100px; animation-delay: -10s; }
        @keyframes float { 0% { transform: translate(0,0); } 100% { transform: translate(100px, 50px); } }

        .overlay { position: fixed; inset: 0; background: var(--overlay-bg); opacity: 0; pointer-events: none; transition: 0.3s ease; z-index: 999; }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .menu-btn { position: fixed; top: 25px; left: 25px; z-index: 1001; background: var(--card-bg); border: 1px solid var(--border); padding: 12px; border-radius: 16px; cursor: pointer; }
        .sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100vh; background: var(--sidebar-bg); z-index: 1000; padding: 80px 20px; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); border-right: 1px solid var(--border); overflow-y: auto; }
        .sidebar.active { left: 0; }
        
        .sidebar-header { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin: 25px 0 10px 10px; font-weight: 800; opacity: 0.6; }
        .sidebar-item { display: flex; align-items: center; gap: 12px; color: var(--text-main); padding: 12px 15px; border-radius: 14px; cursor: pointer; text-decoration: none; font-weight: 600; margin-bottom: 4px; transition: 0.2s; border: none; background: transparent; width: 100%; text-align: left; }
        .sidebar-item:hover, .active-ver { background: var(--border); color: var(--accent); }

        .content { padding: 100px 24px 120px; max-width: 850px; margin: 0 auto; }
        .glass-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 30px; padding: 30px; backdrop-filter: blur(10px); }
        
        .list-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .bulk-actions { display: flex; gap: 8px; }
        .bulk-actions button { background: var(--border); border: none; color: var(--text-main); font-weight: 700; font-size: 0.7rem; cursor: pointer; padding: 8px 12px; border-radius: 10px; transition: 0.2s; }
        .bulk-actions button:hover { background: var(--accent); color: white; }

        .section-divider { font-size: 0.75rem; text-transform: uppercase; font-weight: 800; color: var(--accent); margin: 40px 0 15px 10px; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .gapps-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 16px 20px; background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 20px; transition: 0.2s; cursor: pointer; margin-bottom: 10px;
            position: relative; z-index: 2;
        }
        
        .has-children-ui::before {
            content: ''; position: absolute; top: 4px; left: 10px; right: 10px; bottom: -6px;
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; z-index: -1; opacity: 0.4;
        }

        .gapps-item:hover { border-color: var(--accent); background: var(--border); }
        .sub-container { margin-left: 25px; border-left: 2px solid var(--border); padding-left: 15px; display: none; margin-bottom: 30px; margin-top: -5px; }
        .sub-container.visible { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .gapps-info { display: flex; align-items: center; gap: 15px; flex: 1; }
        .gapps-icon { width: 34px; height: 34px; object-fit: contain; border-radius: 8px; }
        .gapps-icon-fallback { 
            width: 36px; height: 36px; border-radius: 12px; display: flex; 
            align-items: center; justify-content: center; font-weight: 900; color: white; 
            font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .action-group { display: flex; align-items: center; gap: 12px; }
        .dropdown-trigger { opacity: 0; pointer-events: none; transition: 0.3s; }
        .dropdown-trigger.has-sub { opacity: 0.4; pointer-events: auto; }
        .dropdown-trigger.active-sub { opacity: 1; color: var(--accent); transform: rotate(180deg); }
        .gapps-item.disabled { opacity: 0.4; pointer-events: none; filter: grayscale(1); }

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; inset: 0; background-color: #ccc; transition: .4s; border-radius: 34px; cursor: pointer; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        .fab { position: fixed; bottom: 30px; right: 30px; background: var(--text-main); color: var(--bg-base); padding: 20px 35px; border-radius: 25px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 100; }
        #config-input { display: none; }
    </style>
</head>
<body>
    <div class="bg-wrapper"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="menu-btn" onclick="toggleSidebar()"><i data-lucide="menu"></i></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">General</div>
        <div class="sidebar-item" onclick="location.reload()"><i data-lucide="home"></i> Home</div>
        <a href="gapps.html" class="sidebar-item"><i data-lucide="globe"></i> Go to Gapps Site</a>
        <div class="sidebar-item"><i data-lucide="layout"></i> Creations</div>
        <label class="sidebar-item" for="config-input">
            <i data-lucide="upload-cloud"></i> Import Config
            <input type="file" id="config-input" accept=".conf,.txt" onchange="analyzeConfig(this)">
        </label>

        <div class="sidebar-header">Android Versions</div>
        <div id="os-list"></div>
    </nav>

    <div class="content">
        <div class="glass-card">
            <div class="list-header">
                <div>
                    <h1 id="title-os" style="letter-spacing:-1.5px; font-weight: 800;">Android 16</h1>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <input type="text" id="file-name" value="nikgapps" style="background:transparent; border:none; color:var(--accent); font-weight:800; font-size:1rem; outline:none; width: 100px;">
                        <span style="opacity:0.5; font-weight:800;">.conf</span>
                    </div>
                </div>
                <div class="bulk-actions">
                    <button onclick="bulkToggle(true)">SELECT ALL</button>
                    <button onclick="bulkToggle(false)">CLEAR ALL</button>
                </div>
            </div>

            <div id="section-packages">
                <div class="section-divider">Package Groups</div>
                <div id="list-packages"></div>
            </div>

            <div id="section-apps">
                <div class="section-divider">Individual Apps</div>
                <div id="list-apps"></div>
            </div>
        </div>
    </div>

    <button class="fab" onclick="buildConfig()"><i data-lucide="download"></i> Generate Config</button>

    <script>
        let templateData = [];
        const googleColors = ['var(--g-blue)', 'var(--g-red)', 'var(--g-yellow)', 'var(--g-green)'];
        const ignoredKeys = ["AndroidVersion", "Version", "LogDirectory", "InstallPartition", "Mode", "WipeDalvikCache", "WipeRuntimePermissions", "ExecuteBackupRestore", "UseZipConfig", "OverwriteWithZipConfig", "GmsOptimization", "GenerateLogs"];

        function toggleSidebar() { 
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('active');
            ov.classList.toggle('active');
        }

        const osList = [16,15,14,13,12,11,10];
        const osContainer = document.getElementById('os-list');
        osList.forEach(ver => {
            const el = document.createElement('button');
            el.className = `sidebar-item ${ver === 16 ? 'active-ver' : ''}`;
            el.innerHTML = `<i data-lucide="layers"></i> Android ${ver}`;
            el.onclick = () => setOS(ver, el);
            osContainer.appendChild(el);
        });

        async function setOS(ver, el) {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active-ver'));
            el.classList.add('active-ver');
            document.getElementById('title-os').innerText = `Android ${ver}`;
            loadTemplate(ver);
            if(window.innerWidth < 960) toggleSidebar();
        }

        async function loadTemplate(ver) {
            for (let v = 45; v >= 30; v--) {
                try {
                    const res = await fetch(`./template${ver}/${v}.conf`);
                    if (res.ok) {
                        const text = await res.text();
                        templateData = text.split('\n');
                        renderSmartList();
                        return;
                    }
                } catch (e) {}
            }
        }

        function getOfficialIcon(name) {
            const mapping = {
                'GooglePlayStore': 'play_prism', 'PlayStore': 'play_prism', 'GmsCore': 'googleg', 'GooglePhotos': 'photos',
                'YouTube': 'youtube', 'YouTubeMusic': 'youtube_music', 'Gmail': 'gmail', 'GoogleMaps': 'maps',
                'GoogleChrome': 'chrome', 'Drive': 'drive', 'GBoard': 'gboard', 'GoogleCalendar': 'calendar',
                'GoogleKeep': 'keep', 'FilesGoogle': 'files', 'GoogleMessages': 'messages', 'GoogleDialer': 'contacts',
                'DigitalWellbeing': 'wellbeing', 'GoogleSearch': 'googleg', 'Gemini': 'googleg', 'Velvet': 'googleg',
                'GoogleWallet': 'wallet', 'GoogleOne': 'google_one', 'Meet': 'meet', 'GoogleRecorder': 'recorder',
                'PixelLauncher': 'pixel_launcher', 'DevicePersonalizationServices': 'personalization', 'QuickAccessWallet': 'wallet',
                'SetupWizard': 'googleg', 'GoogleContacts': 'contacts', 'GoogleClock': 'clock', 'GoogleHome': 'home'
            };
            if(name === 'DigitalWellbeing') return 'https://www.gstatic.com/images/branding/product/2x/wellbeing_96dp.png';
            const slug = mapping[name];
            return slug ? `https://www.gstatic.com/images/branding/product/2x/${slug}_96dp.png` : null;
        }

        // Logic to try multiple formats before giving up
        function tryLocal(img, name, color) {
            const formats = ['.png', '.jpg', '.jpeg', '.webp'];
            let currentIdx = formats.indexOf(img.getAttribute('data-ext')) || 0;
            
            if (currentIdx < formats.length - 1) {
                const nextExt = formats[currentIdx + 1];
                img.setAttribute('data-ext', nextExt);
                img.src = `icons/${name}${nextExt}`;
            } else {
                // Done with local, try online
                const online = getOfficialIcon(name);
                if (online && img.src !== online) {
                    img.src = online;
                    img.onerror = () => fallbackToLetter(img, name, color);
                } else {
                    fallbackToLetter(img, name, color);
                }
            }
        }

        function fallbackToLetter(img, name, color) {
            const fallback = document.createElement('div');
            fallback.className = 'gapps-icon-fallback';
            fallback.style.background = color;
            fallback.innerText = name[0];
            img.replaceWith(fallback);
        }

        function renderSmartList() {
            const pkgList = document.getElementById('list-packages');
            const appList = document.getElementById('list-apps');
            pkgList.innerHTML = ''; appList.innerHTML = '';
            
            let lastParentId = null;
            let currentSubContainer = null;

            templateData.forEach((line, i) => {
                if (line.includes('=') && !line.startsWith('#')) {
                    const [rawKey] = line.split('=');
                    const isSub = rawKey.startsWith('>>');
                    const cleanKey = rawKey.replace(/>/g, '');

                    if (!ignoredKeys.includes(cleanKey)) {
                        const bgColor = googleColors[cleanKey.length % 4];
                        
                        // Icon setup: Start with .png, use data-ext to track progress in tryLocal
                        const iconHtml = `<img src="icons/${cleanKey}.png" data-ext=".png" class="gapps-icon" 
                            onerror="tryLocal(this, '${cleanKey}', '${bgColor}')">`;

                        const itemHtml = `
                            <div class="gapps-item ${isSub ? 'disabled sub-row' : 'parent-row'}" id="row-${i}" onclick="handleCardClick(${i}, ${isSub})">
                                <div class="gapps-info">
                                    ${iconHtml}
                                    <span style="font-weight:700;">${cleanKey}</span>
                                </div>
                                <div class="action-group">
                                    ${!isSub ? `<i data-lucide="chevron-down" class="dropdown-trigger" id="drop-${i}"></i>` : ''}
                                    <label class="switch" onclick="event.stopPropagation()">
                                        <input type="checkbox" id="check-${i}" data-key="${rawKey}" data-clean="${cleanKey}" onchange="handleToggle(${i}, ${isSub})">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>
                        `;

                        if (!isSub) {
                            const wrapper = document.createElement('div');
                            wrapper.id = `wrapper-${i}`;
                            wrapper.innerHTML = itemHtml;
                            appList.appendChild(wrapper);
                            lastParentId = i;

                            currentSubContainer = document.createElement('div');
                            currentSubContainer.className = 'sub-container';
                            currentSubContainer.id = `sub-of-${i}`;
                            appList.appendChild(currentSubContainer);
                        } else if (currentSubContainer) {
                            const subItem = document.createElement('div');
                            subItem.innerHTML = itemHtml;
                            currentSubContainer.appendChild(subItem.firstElementChild);
                            
                            const parentRow = document.getElementById(`row-${lastParentId}`);
                            const parentWrapper = document.getElementById(`wrapper-${lastParentId}`);
                            if(parentRow) {
                                parentRow.classList.add('has-children-ui');
                                document.getElementById(`drop-${lastParentId}`).classList.add('has-sub');
                                pkgList.appendChild(parentWrapper);
                                pkgList.appendChild(currentSubContainer);
                            }
                        }
                    }
                }
            });
            lucide.createIcons();
        }

        function handleToggle(index, isSub) {
            const checkbox = document.getElementById(`check-${index}`);
            const cleanKey = checkbox.getAttribute('data-clean');

            if (checkbox.checked) {
                if (cleanKey === "SetupWizard") {
                    const other = document.querySelector('input[data-clean="PixelSetupWizard"]');
                    if(other) other.checked = false;
                } else if (cleanKey === "PixelSetupWizard") {
                    const other = document.querySelector('input[data-clean="SetupWizard"]');
                    if(other) other.checked = false;
                }
            }

            if (!isSub) {
                const subGroup = document.getElementById(`sub-of-${index}`);
                if (subGroup) {
                    const children = subGroup.querySelectorAll('input');
                    children.forEach(child => {
                        child.checked = checkbox.checked;
                        child.closest('.gapps-item').classList.toggle('disabled', !checkbox.checked);
                    });
                }
            }
        }

        function handleCardClick(index, isSub) {
            if (isSub) return;
            const subGroup = document.getElementById(`sub-of-${index}`);
            const chevron = document.getElementById(`drop-${index}`);
            if (subGroup && subGroup.children.length > 0) {
                const isVisible = subGroup.classList.toggle('visible');
                chevron.classList.toggle('active-sub', isVisible);
            }
        }

        function bulkToggle(state) {
            document.querySelectorAll('input[type="checkbox"]').forEach(input => {
                input.checked = state;
                const row = input.closest('.gapps-item');
                const id = input.id.split('-')[1];
                if (!row.classList.contains('sub-row')) handleToggle(id, false);
            });
        }

        function analyzeConfig(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const lines = e.target.result.split('\n');
                lines.forEach(line => {
                    if(line.includes('=') && !line.startsWith('#')) {
                        const [key, val] = line.split('=');
                        const targetInput = document.querySelector(`input[data-key="${key.trim()}"]`);
                        if(targetInput) {
                            targetInput.checked = (val.trim() === '1');
                            const id = targetInput.id.split('-')[1];
                            handleToggle(id, targetInput.closest('.gapps-item').classList.contains('sub-row'));
                        }
                    }
                });
            };
            reader.readAsText(file);
        }

        function buildConfig() {
            let output = "";
            const allInputs = document.querySelectorAll('input[type="checkbox"]');
            templateData.forEach(line => {
                let updatedLine = line;
                allInputs.forEach(input => {
                    const key = input.getAttribute('data-key');
                    if (line.startsWith(key + '=')) {
                        updatedLine = `${key}=${input.checked ? '1' : '0'}`;
                    }
                });
                output += updatedLine + "\n";
            });
            const name = document.getElementById('file-name').value || 'nikgapps';
            const blob = new Blob([output], { type: 'application/octet-stream' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = name + ".conf";
            link.click();
        }

        loadTemplate(16);
    </script>
</body>
</html>
