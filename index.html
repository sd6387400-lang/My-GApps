<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NikGApps | Android 16 ARM64</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-base: #f8f9ff;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1a1c1e;
            --text-dim: #44474e;
            --accent: #006494;
            --sidebar-bg: rgba(255, 255, 255, 0.98);
            --border: rgba(0, 0, 0, 0.05);
            --blob-1: #d0e4ff;
            --blob-2: #e1dfff;
            --btn-bg: #1a1c1e;
            --btn-text: #ffffff;
            --overlay: rgba(0, 0, 0, 0.4);
            --latest-green: #2e7d32;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-base: #0f1115;
                --card-bg: rgba(26, 28, 30, 0.6);
                --text-main: #e2e2e6;
                --text-dim: #c4c6cf;
                --accent: #91cdff;
                --sidebar-bg: rgba(15, 17, 21, 0.98);
                --border: rgba(255, 255, 255, 0.08);
                --blob-1: #1e2a3d;
                --blob-2: #28224d;
                --btn-bg: #f8f9ff;
                --btn-text: #111318;
                --overlay: rgba(0, 0, 0, 0.6);
                --latest-green: #81c784;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- Optimized Background (Moving Solid Circles) --- */
        .bg-wrapper { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        
        .blob { 
            position: absolute; 
            width: 600px; 
            height: 600px; 
            border-radius: 50%; 
            opacity: 0.6; /* High visibility */
            pointer-events: none;
            animation: float 20s infinite ease-in-out alternate;
        }
        .blob-1 { background: var(--blob-1); top: -150px; left: -150px; }
        .blob-2 { 
            background: var(--blob-2); 
            bottom: -150px; 
            right: -150px; 
            animation-delay: -10s;
            animation-duration: 25s;
        }

        /* GPU Accelerated floating animation */
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(80px, 40px) rotate(5deg); }
            100% { transform: translate(-30px, 90px) rotate(-5deg); }
        }

        /* --- Sidebar & UI --- */
        #overlay { 
            position: fixed; 
            inset: 0; 
            background: var(--overlay); 
            z-index: 999; 
            opacity: 0; 
            visibility: hidden; 
            transition: 0.4s; 
            /* Removed blur for performance */
        }
        #overlay.active { opacity: 1; visibility: visible; }
        
        .menu-btn { position: fixed; top: 25px; left: 25px; z-index: 1001; background: var(--card-bg); border: 1px solid var(--border); padding: 12px; border-radius: 16px; cursor: pointer; backdrop-filter: blur(15px); transition: 0.3s; }
        
        .sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100vh; background: var(--sidebar-bg); z-index: 1000; padding: 100px 25px 40px; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); border-right: 1px solid var(--border); overflow-y: auto; }
        .sidebar.active { left: 0; }
        .sidebar-header { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin: 25px 0 10px 12px; font-weight: 800; }
        .sidebar-item { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-dim); font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; padding: 12px; border-radius: 12px; transition: 0.2s; cursor: pointer; }
        .sidebar-item:hover { background: var(--border); color: var(--text-main); }
        .sidebar-item.active-rel { background: var(--accent); color: var(--bg-base); }

        /* --- Content Layout --- */
        .content { padding: 120px 24px 80px; max-width: 1100px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 40px; }
        @media (min-width: 960px) {
            .content { flex-direction: row; align-items: flex-start; }
            .left-panel { flex: 1; position: sticky; top: 120px; }
            .right-panel { flex: 1.4; }
        }

        .glass-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 35px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); }

        /* --- Components --- */
        h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; line-height: 1; margin-bottom: 15px; }
        .latest-pill { color: var(--latest-green); background: rgba(46, 125, 50, 0.1); padding: 6px 14px; border-radius: 50px; font-weight: 800; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 12px; }
        .tag-badge { background: var(--border); color: var(--text-dim); padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; margin-left: 8px; }

        .btn-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        .action-btn { width: 100%; text-decoration: none; background: var(--btn-bg); color: var(--btn-text); padding: 18px; border-radius: 20px; font-weight: 700; text-align: center; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; cursor: pointer; }
        .action-btn.secondary { background: transparent; border: 2px solid var(--btn-bg); color: var(--btn-bg); }
        .action-btn:hover { transform: translateY(-3px); opacity: 0.9; }

        .markdown-body { font-size: 1.05rem; line-height: 1.8; color: var(--text-dim); }
        .markdown-body h1, .markdown-body h2 { color: var(--text-main); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        /* --- REVOLUTION BUTTON VARIABLES --- */

/* --- REVOLUTION BUTTON VARIABLES --- */
:root {
    --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853;
}

.rev-wrapper {
    position: relative;
    width: calc(100% - 24px); 
    height: 85px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    margin: 10px 12px 20px 12px;
}

/* THE FLOATING UNIT - Transparent background to show only RGB */
.rev-float-unit {
    position: relative;
    width: 100%;
    height: 72px;
    border-radius: 20px;
    padding: 2px; /* The Laser Thickness */
    display: flex;
    align-items: center;
    justify-content: center;
    animation: rev-floating 3s ease-in-out infinite;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    overflow: hidden;
    background: transparent; 
}

@keyframes rev-floating {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

/* THE MOVING RGB LASER (No black background) */
.rev-float-unit::before {
    content: '';
    position: absolute;
    width: 150%;
    height: 300%;
    background: conic-gradient(
        from 0deg, 
        transparent 0%, 
        var(--g-blue) 10%, 
        var(--g-green) 20%, 
        var(--g-yellow) 30%, 
        var(--g-red) 40%, 
        transparent 50%
    );
    animation: laserRun 3s linear infinite;
}

@keyframes laserRun {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* THE BUTTON CONTENT - ADAPTIVE BACKGROUND */
.rev-inner {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    border-radius: 18px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    /* Uses your existing card/sidebar background variables */
    background: var(--card-bg); 
    backdrop-filter: blur(10px);
    overflow: hidden;
    transition: background 0.3s, transform 0.3s;
}

/* THE SHINE SWEEP - Reactive to Hover */
.rev-inner::after {
    content: '';
    position: absolute;
    top: 0; 
    left: -150%;
    width: 100%; 
    height: 100%;
    background: linear-gradient(
        90deg, 
        transparent, 
        rgba(255, 255, 255, 0.2), 
        transparent
    );
    transform: skewX(-25deg);
}

.rev-wrapper:hover .rev-inner::after {
    left: 150%;
    transition: 0.8s ease-in-out;
}

.rev-icon-box {
    width: 40px; height: 40px;
    background: var(--g-blue);
    color: #fff;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: 0.3s;
    box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
}

.rev-text-stack { display: flex; flex-direction: column; text-align: left; }
.rev-badge { 
    font-size: 7px; 
    font-weight: 800; 
    text-transform: uppercase; 
    letter-spacing: 1.5px; 
    color: var(--accent); /* Matches your site's accent color */
    margin-bottom: 2px; 
}
.rev-title { 
    font-size: 13px; 
    font-weight: 700; 
    color: var(--text-main); /* Adaptive text color */
    line-height: 1.2; 
}

/* --- HOVER STATES --- */
.rev-wrapper:hover .rev-float-unit {
    animation-play-state: paused;
    transform: scale(1.03);
    padding: 3.5px; /* Border grows on hover */
}

.rev-wrapper:hover .rev-float-unit::before {
    animation-duration: 1.2s; /* Laser speeds up */
}

.rev-wrapper:hover .rev-icon-box {
    background: var(--g-green);
    transform: rotate(-10deg) scale(1.1);
}


    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div id="overlay" onclick="toggleSidebar()"></div>
    <div class="menu-btn" onclick="toggleSidebar()"><i data-lucide="menu"></i></div>

        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">Navigation</div>
            <a href="https://sd6387400-lang.github.io/" class="sidebar-item"><i data-lucide="home"></i> Home</a>
            <a href="https://sd6387400-lang.github.io/creations.html" class="sidebar-item"><i data-lucide="layout-template"></i> My Creations</a>
            
            <div class="sidebar-header">Release History</div>
            <div id="history-container"></div>
            
            <div class="sidebar-header">Create</div>
            
            <a href="create-yourself.html" class="rev-wrapper">
                <div class="rev-float-unit">
                    <div class="rev-inner">
                        <div class="rev-icon-box">
                            <i data-lucide="zap"></i>
                        </div>
                        <div class="rev-text-stack">
                            <span class="rev-badge">New</span>
                            <span class="rev-title">Create Your Own GApps</span>
                        </div>
                    </div>
                </div>
            </a>
        

        </nav>


    <div class="content">
        <div class="left-panel">
            <header>
                <div id="status-badge"></div>
                <h1 id="rel-title">NikGApps</h1>
                <p style="font-weight: 600; font-size: 1rem; color: var(--text-dim); margin-top: 5px;">
                    <span id="pub-date">Fetching...</span>
                    <span id="tag-display" class="tag-badge"></span>
                </p>
            </header>

            <div class="btn-stack">
                <a href="#" id="btn-dl" class="action-btn"><i data-lucide="download"></i> Download GAPPS</a>
                <button onclick="toggleSidebar()" class="action-btn secondary"><i data-lucide="history"></i> View Old Releases</button>
                <a href="#" id="btn-git" target="_blank" class="action-btn secondary"><i data-lucide="github"></i> Repository</a>
            </div>
        </div>

        <div class="right-panel glass-card">
            <div style="font-weight: 800; font-size: 0.7rem; letter-spacing: 1px; color: var(--accent); margin-bottom: 20px; text-transform: uppercase;">
                <i data-lucide="file-text" style="width: 14px; vertical-align: middle;"></i> Build Description
            </div>
            <div id="changelog-md" class="markdown-body">
                <p>Loading release data...</p>
            </div>
        </div>
    </div>

    <script>
        const REPO = "sd6387400-lang/My-GApps";
        let releases = [];

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/releases`);
                releases = await res.json();
                renderRelease(0);
                populateSidebar();
            } catch (e) { document.getElementById('changelog-md').innerText = "Error loading builds."; }
        }

        async function renderRelease(idx) {
            const rel = releases[idx];
            document.getElementById('rel-title').innerText = rel.name || rel.tag_name;
            document.getElementById('pub-date').innerText = new Date(rel.published_at).toLocaleDateString();
            document.getElementById('tag-display').innerText = rel.tag_name;
            
            document.getElementById('status-badge').innerHTML = (idx === 0) 
                ? `<div class="latest-pill"><i data-lucide="star" style="width:14px"></i> LATEST RELEASE</div>` 
                : `<div class="latest-pill" style="color:var(--text-dim); background:var(--border)"><i data-lucide="archive" style="width:14px"></i> PREVIOUS BUILD</div>`;

            const zip = rel.assets.find(a => a.name.endsWith('.zip'));
            document.getElementById('btn-dl').href = zip ? zip.browser_download_url : rel.html_url;
            document.getElementById('btn-git').href = rel.html_url;

            const mdRes = await fetch('https://api.github.com/markdown', {
                method: 'POST',
                body: JSON.stringify({ mode: 'gfm', text: rel.body || "No notes available." })
            });
            document.getElementById('changelog-md').innerHTML = await mdRes.text();
            
            lucide.createIcons();
            if(window.innerWidth < 960 && document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
        }

        function populateSidebar() {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            releases.forEach((rel, i) => {
                const el = document.createElement('div');
                el.className = `sidebar-item ${i === 0 ? 'active-rel' : ''}`;
                el.innerHTML = `<i data-lucide="box"></i> ${rel.name || rel.tag_name}`;
                el.onclick = () => {
                    document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active-rel'));
                    el.classList.add('active-rel');
                    renderRelease(i);
                };
                container.appendChild(el);
            });
            lucide.createIcons();
        }

        init();
        lucide.createIcons();
    </script>
</body>
</html>
